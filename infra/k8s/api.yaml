apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler-api
  namespace: webcrawler
spec:
  replicas: 2
  selector:
    matchLabels: { app: crawler-api }
  template:
    metadata:
      labels: { app: crawler-api }
    spec:
      containers:
        - name: api
          image: your-registry/crawler-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef: { name: crawler-secrets, key: redis-url }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: crawler-secrets, key: database-url }
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef: { name: crawler-secrets, key: celery-broker }
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits: { memory: "512Mi", cpu: "1000m" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: crawler-api
  namespace: webcrawler
spec:
  selector: { app: crawler-api }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crawler-ingress
  namespace: webcrawler
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  rules:
    - host: crawler.your-domain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: crawler-api, port: { number: 8000 } }
          - path: /ws
            pathType: Prefix
            backend:
              service: { name: crawler-api, port: { number: 8000 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: crawler-frontend, port: { number: 80 } }
